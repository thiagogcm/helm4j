apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: busybox:1.37
      command:
        - sh
        - -c
        - 'echo "configured message: {{ .Values.message }}" && exit 0'
