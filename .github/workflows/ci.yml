name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  check:
    name: Build, Test, Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "libhelm4j/go.mod"
          cache-dependency-path: "libhelm4j/go.sum"

      - name: Install just and ripgrep
        uses: taiki-e/install-action@v2
        with:
          tool: just,ripgrep

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run full verification (Go + native parity + Java + coverage)
        run: just ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/build/test-results/test/"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: "**/build/reports/jacoco/test/html/"
